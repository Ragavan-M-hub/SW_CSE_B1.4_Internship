<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Child Selector</title>
    <style>
        ul > li{
            color: teal;
            background-color: plum;
        }
    </style>
</head>
<body>
    <ul>
        <li>Laptop</li>
        <li>Mobile</li>
        <li>Tablet</li>
    </ul>
</body>
</html>
