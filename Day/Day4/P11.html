<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sibiling Selector</title>
    <style>
        h4+p{
            color: khaki;
            background-color: greenyellow;
        }

        h3~p{
            color: khaki;
            background-color: greenyellow;
        }
    </style>
</head>
<body>
    <p>Hello world</p>
    <h4>Selector</h4>
    <p>Bye World</p>
    <p>End</p>

    <br>
    <p>Hello world</p>
    <h3>Selector</h3>
    <p>Bye World</p>
    <p>End</p>
</body>
</html>
