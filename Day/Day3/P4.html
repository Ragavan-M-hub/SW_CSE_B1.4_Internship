<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Tag</title>
</head>
<body>
    <video src="sample-5s-360p.mp4" controls>
        Your browser does not support video tag
    </video>

    <video src="sample-5s-360p.webm" controls>
        Your browser does not support video tag
    </video>

    <!-- Width & Height  -->
    <video src="sample-5s-360p.mp4" width="880" height="520" controls>
        Your browser does not support the video tag
    </video>

    <!-- autoplay -->
    <video src="sample-5s-360p.mp4" width="880" height="520" autoplay controls>
        Your browser does not support the video tag
    </video>

    <!-- muted -->
    <video src="sample-5s-360p.mp4" width="880" height="520" autoplay muted controls>
        Your browser does not support the video tag
    </video>

    <!-- loop -->
    <video src="sample-5s-360p.mp4" width="880" height="520" autoplay loop controls>
        Your browser does not support the video tag
    </video>

    <!-- poster -->
    <video src="sample-5s-360p.mp4" width="880" height="520" poster="play.png" autoplay controls>
        Your browser does not support the video tag
    </video>

    <!-- preload -->
    <video src="sample-5s-360p.mp4" width="880" height="520" preload="none" controls>
        Your browser does not support the video tag
    </video>
</body>
</html>
