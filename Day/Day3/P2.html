<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Spaning</title>
</head>
<body>
    <table border="1">
        <tr>
            <th colspan="2">Student Details</th>
        </tr>
        <tr>
            <td>Name</td>
            <td>Ragavan</td>
        </tr>
        <tr>
            <td>Age</td>
            <td>20</td>
        </tr>
    </table>
    <br>
    <table border="1">
        <tr>
            <th rowspan="2">Day</th>
            <th>Morning</th>
            <th>Evening</th>
        </tr>
        <tr>
            <td>Frontend</td>
            <td>Backend</td>
        </tr>
    </table>
</body>
</html>
