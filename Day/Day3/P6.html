<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html Audio</title>
</head>
<body>
    <audio src="sample-3s.mp3" controls>Your browser does not support audio tag</audio>

    <!-- autoplay -->
    <audio src="sample-3s.mp3" autoplay controls>Your browser does not support audio tag</audio>

    <!-- muted -->
    <audio src="sample-3s.mp3" autoplay muted>Your browser does not support audio tag</audio>

    <!-- loop -->
    <audio src="sample-3s.mp3" loop controls>Your browser does not support audio tag</audio>

    <!-- preload -->
    <audio src="sample-3s.mp3" preload="none" controls>Your browser does not support audio tag</audio>
</body>
</html>
