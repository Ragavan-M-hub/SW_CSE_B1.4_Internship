<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html Table</title>
</head>
<body>
    <table border="1">
        <caption>Monthly Saving</caption>
        <tr>
            <th>Month</th>
            <th>Savings</th>
        </tr>
        <tr>
            <td>Jan</td>
            <td>50000</td>
        </tr>
        <tr>
            <td>Feb</td>
            <td>70000</td>
        </tr>
    </table>

    <table border="1">
        <caption>Monthly Sales</caption>
        <thead>
            <tr>
                <th>Month</th>
                <th>Sales</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Jun</td>
                <td>30000</td>
            </tr>
            <tr>
                <td>Jul</td>
                <td>40000</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>Total</td>
                <td>70000</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
