<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>
    <style>
        .container{
            width: 280px;
            height: 80px;
            background-color: mediumturquoise;
            padding: 15px;
            border: 2px solid darkslategrey;
            margin: 30px;
        }
        .container2{
            width: 280px;
            height: 80px;
            background-color: navajowhite;
            padding-top: 5px;
            padding-right: 0px;
            padding-bottom: 20px;
            padding-left: 49px;
            
            border-top: 5px solid red;
            border-right: 10px dashed blue;
            border-bottom: 20px dotted green;
            border-left: 15px solid yellow;

            margin-top: 5px;
            margin-right: 20px;
            margin-bottom: 10px;
            margin-left: 25px;
        }
        .container3{
            width: 280px;
            height: 80px;
            background-color: fuchsia;
            padding: 100px 25px;
        }
    </style>
</head>
<body>
    <p class="container">Paragraph 1</p>
    <p class="container2">Paragraph 2</p>
    <p class="container3">Paragraph 3</p>
</body>
</html>
