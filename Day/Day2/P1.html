<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Tags</title>
</head>
<body>
    <!-- src: source alt: alternate text | Self-closing tag -->
    <img src="nature.jpeg" alt="Could not find the image"> 
    <img src="image/nature2.jpg" alt="Could not find the image"> 
    
    <!-- Common attributes & variations -->
     <!-- Width & height -->
    <img src="nature.jpeg" alt="Could not find the image" width="200px" height="100px"> 
    <!-- Tooltip -->
    <img src="nature.jpeg" alt="Could not find the image" title="Image of nature"> 
    <!-- Style -->
    <img src="nature.jpeg" alt="Could not find the image" 
    style="width:200px; height:100px; border-radius:10%; border:2px solid #cd2323;"> 
</body>
</html>
