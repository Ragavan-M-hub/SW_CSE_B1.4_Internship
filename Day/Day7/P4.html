<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox: Flex Item</title>
    <style>
        .nav{
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: burlywood;
        padding: 10px 20px;
        color: crimson;
       }
       .nav-links{
            display: flex;
            gap: 16px;
            list-style: none;
       }
       .nav-links a{
            color: chocolate;
            text-decoration: none;
       }
       .nav-links a:hover{
            /* text-decoration: underline; */
            color: black;
            background-color: chartreuse;
        }
    </style>
</head>
<body>
    </p>
    <nav class="nav">
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
</body>
</html>
